<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raise Ticket</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#EEF1F6;
    --surface:#FFFFFF;
    --surface-2:#F7F9FC;
    --border:#E3E8F0;
    --border-strong:#D3DAE6;

    --text:#101828;
    --text-muted:#5D6B82;
    --text-faint:#98A2B3;

    --primary:#12294F;
    --primary-2:#1D3D73;
    --accent:#0C8599;
    --accent-soft:#E4F6F8;

    --danger:#D92D20;
    --danger-soft:#FDEDEB;
    --warning:#B54708;
    --warning-soft:#FEF6E7;
    --success:#0F7A47;
    --success-soft:#E7F7EE;

    --radius-lg:16px;
    --radius-md:12px;
    --radius-sm:8px;
    --shadow-sm:0 1px 2px rgba(16,24,40,.06);
    --shadow-md:0 8px 24px -8px rgba(16,24,40,.14);
}

*{ box-sizing:border-box; }
body{
    margin:0;
    background:
        radial-gradient(1100px 380px at 12% -10%, #EAF3F5 0%, transparent 60%),
        var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding:0 0 64px 0;
}

.shell{ max-width:760px; margin:0 auto; padding:0 28px; }

/* ---------- Top bar (matches My Tickets) ---------- */
.topbar{
    background:linear-gradient(180deg, var(--primary) 0%, var(--primary-2) 130%);
    padding:20px 0 84px 0;
    margin-bottom:-64px;
}
.topbar-inner{
    max-width:760px;
    margin:0 auto;
    padding:0 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}
.brand{ display:flex; align-items:center; gap:12px; }
.brand-mark{
    width:38px; height:38px; border-radius:10px;
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.18);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-family:'Lexend',sans-serif; font-weight:700; font-size:14px;
}
.brand-name{ color:#fff; font-family:'Lexend',sans-serif; font-weight:600; font-size:15px; line-height:1.2; }
.brand-sub{ color:rgba(255,255,255,.55); font-size:12px; line-height:1.2; }
.topbar-badge{
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.2);
    color:#e6f2ff;
    font-size:12.5px;
    font-weight:600;
    padding:8px 14px;
    border-radius:999px;
    display:inline-flex;
    align-items:center;
    gap:7px;
}

/* ---------- Form card ---------- */
.page-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow-md);
    padding:30px 32px;
}
.page-title{
    font-family:'Lexend',sans-serif;
    font-size:23px;
    font-weight:600;
    margin-bottom:4px;
}
.page-subtitle{
    color:var(--text-muted);
    font-size:14px;
    margin-bottom:28px;
}

.section{ margin-bottom:22px; }
.section label{
    display:flex;
    align-items:center;
    gap:6px;
    margin-bottom:9px;
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:.07em;
    font-weight:600;
    color:var(--text-faint);
}
.section label i{ font-size:12px; color:var(--text-faint); }
.section label .req{ color:var(--danger); }
.field-hint{
    font-size:12px;
    color:var(--text-faint);
    margin-top:7px;
}

input[type="text"], select, textarea{
    width:100%;
    background:var(--surface-2);
    border:1px solid var(--border);
    color:var(--text);
    border-radius:var(--radius-sm);
    padding:12px 14px;
    font-size:14.5px;
    font-family:'Inter', sans-serif;
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease, background .15s ease;
}
input[type="text"]::placeholder, textarea::placeholder{ color:var(--text-faint); }

input[type="text"]:focus, select:focus, textarea:focus{
    border-color:var(--accent);
    background:var(--surface);
    box-shadow:0 0 0 3.5px var(--accent-soft);
}

textarea{ resize:vertical; min-height:96px; line-height:1.55; }

select{
    appearance:none;
    background-image:linear-gradient(45deg, transparent 50%, #98A2B3 50%), linear-gradient(135deg, #98A2B3 50%, transparent 50%);
    background-position:calc(100% - 20px) calc(1.1em + 2px), calc(100% - 14px) calc(1.1em + 2px);
    background-size:6px 6px, 6px 6px;
    background-repeat:no-repeat;
    cursor:pointer;
}

.actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-top:8px;
    padding-top:22px;
    border-top:1px solid var(--border);
}

.btn{
    border:none;
    border-radius:var(--radius-sm);
    padding:13px 18px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:all .15s ease;
    font-family:'Inter', sans-serif;
}
.btn-primary{ background:var(--primary); color:#fff; }
.btn-primary:hover{ background:var(--primary-2); transform:translateY(-1px); box-shadow:0 6px 16px rgba(18,41,79,.24); }

.btn-outline{
    background:var(--accent-soft);
    color:var(--accent);
    border:1px solid transparent;
}
.btn-outline:hover{ background:#fff; border-color:var(--accent); }

/* ---------- Suggested resolutions panel ---------- */
.suggest-panel{
    margin-top:20px;
    border:1px solid var(--border);
    border-radius:var(--radius-md);
    background:var(--surface-2);
    overflow:hidden;
    display:none;
}
.suggest-panel.show{ display:block; }
.suggest-panel-header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px 18px;
    border-bottom:1px solid var(--border);
    background:var(--surface);
}
.suggest-panel-header i{ color:var(--accent); font-size:16px; }
.suggest-panel-title{ font-family:'Lexend',sans-serif; font-weight:600; font-size:14px; }
.suggest-panel-body{ padding:6px 18px 16px 18px; }
.suggest-empty{
    padding:18px 4px;
    color:var(--text-muted);
    font-size:13.5px;
    display:flex;
    align-items:center;
    gap:9px;
}
.suggest-item{
    padding:14px 0;
    border-bottom:1px solid var(--border);
}
.suggest-item:last-child{ border-bottom:none; }
.suggest-item-title{
    font-size:13.5px;
    font-weight:600;
    color:var(--text);
    margin-bottom:4px;
    display:flex;
    align-items:center;
    gap:7px;
}
.suggest-item-title i{ color:var(--text-faint); font-size:12px; }
.suggest-item-res{
    font-size:13px;
    color:var(--text-muted);
    line-height:1.55;
    padding-left:19px;
    border-left:2px solid var(--accent-soft);
}
.suggest-loading{
    padding:16px 4px;
    color:var(--text-muted);
    font-size:13.5px;
    display:flex;
    align-items:center;
    gap:9px;
}

@media (max-width:600px){
    .actions{ grid-template-columns:1fr; }
    .page-card{ padding:22px 20px; }
    .shell, .topbar-inner{ padding:0 16px; }
}
</style>
</head>

<body>

<div class="topbar">
    <div class="topbar-inner">
        <div class="brand">
            <div class="brand-mark">SD</div>
            <div>
                <div class="brand-name">HCL ServiceDesk</div>
                <div class="brand-sub">IT Support &amp; Incident Management</div>
            </div>
        </div>
        <span class="topbar-badge"><i class="bi bi-headset"></i> Support Portal</span>
    </div>
</div>

<div class="shell">

    <form action="/raise_ticket" method="POST" id="raiseTicketForm">
        <div class="page-card">

            <div class="page-title">Raise a Ticket</div>
            <div class="page-subtitle">Submit a service request with clear details to help our support team resolve it quickly.</div>

            <div class="section">
                <label><i class="bi bi-tag"></i> Issue Type <span class="req">*</span></label>
                <select name="issueType" id="issueType" required>
                    <option value="">Select issue type</option>
                    <option value="Hardware">Hardware</option>
                    <option value="Software">Software</option>
                    <option value="Network">Network</option>
                    <option value="Email">Email</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="section">
                <label><i class="bi bi-pencil"></i> Short Description <span class="req">*</span></label>
                <input type="text" name="shortDesc" id="shortDesc" placeholder="Briefly describe the issue" required>
            </div>

            <div class="section">
                <label><i class="bi bi-file-text"></i> Detailed Description</label>
                <textarea name="longDesc" id="longDesc" placeholder="Add relevant context, impact, and steps taken"></textarea>
            </div>

            <div class="section" style="margin-bottom:0;">
                <label><i class="bi bi-flag"></i> Priority</label>
                <select name="priority" id="priority">
                    <option value="">Select priority</option>
                    <option value="P1">P1 &mdash; Critical, work is blocked</option>
                    <option value="P2">P2 &mdash; High, significant impact</option>
                    <option value="P3">P3 &mdash; Low, minor inconvenience</option>
                </select>
            </div>

            <div id="suggestPanel" class="suggest-panel">
                <div class="suggest-panel-header">
                    <i class="bi bi-stars"></i>
                    <span class="suggest-panel-title">Suggested resolutions from ticket history</span>
                </div>
                <div class="suggest-panel-body" id="suggestPanelBody"></div>
            </div>

            <div class="actions">
                <button class="btn btn-outline" type="button" onclick="suggestedResolution(event)">
                    <i class="bi bi-stars"></i> View Suggested Resolutions
                </button>
                <button class="btn btn-primary" type="submit">
                    <i class="bi bi-send"></i> Submit Ticket
                </button>
            </div>

        </div>
    </form>
</div>

<script>
function escapeHtml(str){
    return String(str)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;');
}

function suggestedResolution(event){
    const text = document.getElementById('shortDesc').value;
    const panel = document.getElementById('suggestPanel');
    const body = document.getElementById('suggestPanelBody');

    panel.classList.add('show');
    body.innerHTML = `<div class="suggest-loading"><i class="bi bi-arrow-repeat"></i> Searching ticket history&hellip;</div>`;

    fetch('/suggest_resolutions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ description: text })
    })
    .then(response => response.json())
    .then(data => {
        if (!data || data.length === 0) {
            body.innerHTML = `<div class="suggest-empty"><i class="bi bi-info-circle"></i> No matching resolutions found in history. Your ticket looks unique.</div>`;
            return;
        }
        body.innerHTML = data.map(ticket => `
            <div class="suggest-item">
                <div class="suggest-item-title"><i class="bi bi-ticket-perforated"></i> ${escapeHtml(ticket.shortDesc)}</div>
                <div class="suggest-item-res">${escapeHtml(ticket.resolution)}</div>
            </div>
        `).join('');
    })
    .catch(error => {
        console.error('Error fetching suggestions:', error);
        body.innerHTML = `<div class="suggest-empty"><i class="bi bi-exclamation-triangle"></i> Could not retrieve suggestions at this time.</div>`;
    });
}
</script>

</body>
</html>
