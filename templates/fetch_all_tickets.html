<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
/* ─── TICKET TABLE ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --base:    #0D1117;
    --surface: #161B22;
    --card:    #21262D;
    --border:  #30363D;
    --blue:    #58A6FF;
    --green:   #3FB950;
    --red:     #F78166;
    --amber:   #E3B341;
    --purple:  #BC8CFF;
    --text:    #E6EDF3;
    --muted:   #8B949E;
    --dim:     #484F58;
  }

  body {
    background: var(--base);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th {
    text-align: left;
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,.02);
  }
  td {
    padding: 11px 16px;
    font-size: 12px;
    border-bottom: 1px solid rgba(48,54,61,.6);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }
  .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
  }
  .badge.critical { background: rgba(247,129,102,.15); color: var(--red); border: 1px solid rgba(247,129,102,.3); }
  .badge.high     { background: rgba(227,179,65,.15);  color: var(--amber); border: 1px solid rgba(227,179,65,.3); }
  .badge.medium   { background: rgba(88,166,255,.15);  color: var(--blue); border: 1px solid rgba(88,166,255,.3); }
  .badge.low      { background: rgba(63,185,80,.15);   color: var(--green); border: 1px solid rgba(63,185,80,.3); }
  .badge.resolved { background: rgba(63,185,80,.1);    color: var(--green); }
  .badge.open     { background: rgba(88,166,255,.1);   color: var(--blue); }
  .badge.pending  { background: rgba(227,179,65,.1);   color: var(--amber); }
  .badge.processing { background: rgba(188,140,255,.1); color: var(--purple); }
  .confidence-bar {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .bar-bg {
    width: 70px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--green);
    transition: width .5s;
  }
  .bar-fill.amber { background: var(--amber); }
  .bar-fill.red   { background: var(--red); }
  .panel { display: none; }
  .panel.active { display: block; }
  /* ─── HEADER ─── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--blue) 0%, var(--purple) 100%);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.brand-name { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
.brand-sub { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.status-pill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(63,185,80,.12);
  border: 1px solid rgba(63,185,80,.3);
  border-radius: 20px; padding: 4px 12px;
  font-size: 12px; color: var(--green);
  font-family: 'JetBrains Mono', monospace;
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 8px var(--green);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg,#58A6FF,#BC8CFF);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; cursor: pointer;
}
/* ─── TAB NAV ─── */
.tab-nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex; overflow-x: auto; scrollbar-width: none;
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  background: none; border: none; color: var(--muted);
  padding: 14px 18px; font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  white-space: nowrap; display: flex; align-items: center; gap: 7px;
  transition: color .15s, border-color .15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
.tab-badge { background: var(--red); color: #fff; font-size: 10px; font-weight: 600; border-radius: 10px; padding: 1px 6px; }
/* ─── SEARCH BAR ─── */
.search-bar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; padding: 16px 24px 0; }
.search-input {
  flex: 1; background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 14px; color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 13px; outline: none;
}
.search-input:focus { border-color: var(--blue); }
.filter-btn {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 14px; color: var(--muted);
  font-size: 12px; cursor: pointer; font-family: inherit;
}
.btn {
  background: var(--blue); border: none; border-radius: 8px;
  padding: 9px 14px; color: var(--base);
  font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
}
</style>
<body>

<!-- HEADER -->
<header>
  <div class="brand">
    <div class="brand-icon">⚡</div>
    <div>
      <div class="brand-name">ITSM AI Agent</div>
      <div class="brand-sub">HCLTech</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-pill"><div class="status-dot"></div>All Systems Operational</div>
    <div class="avatar">JY</div>
  </div>
</header>

<!-- TAB NAV -->
<div class="tab-nav">
  <button class="tab-btn" onclick="window.location.href='/welcome_agent'">Dashboard</button>
  <button class="tab-btn active">Tickets <span class="tab-badge">12</span></button>
  <button class="tab-btn" onclick="window.location.href='/analytics'">Analytics</button></div>


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <div class="panel active" id="panel-tickets">    
      <div class="search-bar">
        <input class="search-input" placeholder="Search by ID, summary, assignee..." />
        <button class="filter-btn">Priority ▾</button>
        <button class="filter-btn">Source ▾</button>
        <button class="filter-btn">Status ▾</button>
        <button class="btn">+ New Ticket</button>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">🎫 All Tickets <span style="color:var(--muted);font-weight:400;font-size:12px;margin-left:6px">— 284 today</span></div>
        </div>
        <table>
          <thead>
            <tr><th>ID</th><th>Summary</th><th>Priority</th><th>Source</th><th>Status</th><th>RAG Confidence</th><th>Assigned</th><th>Age</th></tr>
          </thead>
          <tbody> 
            {% for ticket in Tickets %}        
            <tr>
              <td class="mono" style="color:var(--blue)">{{ticket.TicketNumber}}</td>
              <td>{{ticket.shortDesc}}</td>
              <td><span class="badge medium">{{ticket.Priority}}</span></td>
              <td><span class="badge medium">WebUI</span></td>
              <td><span class="badge resolved">{{ticket.status}}</span></td>
              <td><div class="confidence-bar"><div class="bar-bg"><div class="bar-fill" style="width:96%"></div></div><span class="mono">96%</span></div></td>
              <td style="color:var(--muted)">{{ticket.ResolutionType}}</td>
              <td class="mono">9m</td>
            </tr> 
            {% endfor %}          
          </tbody>
        </table>
      </div>
    </div>    
</body>
</html>
