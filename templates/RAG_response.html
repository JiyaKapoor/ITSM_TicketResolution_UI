<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ticket Submitted - Suggested Resolution</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e4e6eb;
            max-width: 720px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .card {
            background: #1a1d27;
            border: 1px solid #2a2e3a;
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .ticket-meta {
            font-size: 14px;
            color: #9aa0ab;
            margin-bottom: 10px;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: #2a2e3a;
        }
        h1 { font-size: 20px; margin-bottom: 4px; }
        h2 { font-size: 16px; color: #9aa0ab; margin-bottom: 12px; }
        .resolution {
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .btn {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 18px;
            background: #4c6ef5;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Ticket #{{ ticket.TicketNumber }} Submitted</h1>
        <div class="ticket-meta">
            <span class="badge">{{ ticket.Priority }}</span>
            &nbsp;{{ ticket.shortDesc }}
        </div>
        <p>SLA due by: {{ ticket.Sla_due.strftime('%b %d, %Y %I:%M %p') }}</p>
    </div>

    <div class="card">
        <h2>Suggested Resolution</h2>
        <div class="resolution">{{ resolution }}</div>
    </div>

    <a href="/accept_resolution?ticket_number={{ticket.TicketNumber}}" class="btn">Accept Resolution</a>
    <a href="/my_tickets" class=""btn>Return to Dashboard</a>



</body>
</html>
